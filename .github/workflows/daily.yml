name: daily-update

on:
  schedule:
    - cron: '15 12 * * *'   # 19:15 VN - sau gio quay
    - cron: '0 1 * * *'     # 08:00 VN - du phong
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 numpy curl_cffi

      - name: Crawl + predict + generate site
        run: python generate_site.py

      - name: Commit & push updates
        run: |
          git config user.name "vietlott-bot"
          git config user.email "vietlott-bot@users.noreply.github.com"
          git add data public
          git diff --cached --quiet && echo "No changes" || git commit -m "auto-update $(date -u +%F_%H:%M)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

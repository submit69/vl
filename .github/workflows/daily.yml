name: daily-update

on:
  schedule:
    # 11:45 UTC = 18:45 VN — ngay sau khi quay xong (18:00-18:30)
    - cron: '45 11 * * *'
    # 01:00 UTC = 08:00 VN — cap nhat buoi sang (du phong)
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 numpy

      - name: Crawl + predict + generate site
        run: python generate_site.py

      - name: Commit & push updates
        run: |
          git config user.name "vietlott-bot"
          git config user.email "vietlott-bot@users.noreply.github.com"
          git add data public
          git diff --cached --quiet && echo "No changes" || git commit -m "auto-update $(date -u +%F_%H:%M)"
          git push
